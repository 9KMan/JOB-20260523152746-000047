version: '3.8'

services:
  # MinIO for local S3-compatible storage
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # PostgreSQL for metadata
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: metadata
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Airflow
  airflow-webserver:
    image: apache/airflow:2.7-python3.11
    command: webserver
    ports:
      - "8080:8080"
    volumes:
      - ./orchestration/dags:/opt/airflow/dags
      - ./orchestration/airflow.cfg:/opt/airflow/airflow.cfg
      - airflow_logs:/opt/airflow/logs
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/metadata
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    depends_on:
      postgres:
        condition: service_healthy

  airflow-scheduler:
    image: apache/airflow:2.7-python3.11
    command: scheduler
    volumes:
      - ./orchestration/dags:/opt/airflow/dags
      - ./orchestration/airflow.cfg:/opt/airflow/airflow.cfg
      - airflow_logs:/opt/airflow/logs
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/metadata
    depends_on:
      postgres:
        condition: service_healthy

  # Metabase for BI
  metabase:
    image: metabase/metabase:latest
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metadata
      MB_DB_PORT: 5432
      MB_DB_USER: airflow
      MB_DB_PASS: airflow
      MB_DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy

  # MLflow for experiment tracking
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "5000:5000"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    command: mlflow server --backend-store-uri postgresql://airflow:airflow@postgres/mlflow --artifacts-destination s3://gold/mlflow-artifacts/

  # API service
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app/api
      - warehouse_data:/data/warehouse
    environment:
      - WAREHOUSE_PATH=/data/warehouse
      - MINIO_ENDPOINT=http://minio:9000
    depends_on:
      - minio
      - postgres

volumes:
  minio_data:
  postgres_data:
  airflow_logs:
  mlflow_artifacts:
  warehouse_data: