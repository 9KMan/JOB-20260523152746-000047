metadata:
  name: data-pipeline
  namespace: data-platform
  labels:
    app: data-pipeline

apiVersion: apps/v1
kind: Deployment

spec:
  replicas: 2
  selector:
    matchLabels:
      app: data-pipeline
  template:
    metadata:
      labels:
        app: data-pipeline
    spec:
      containers:
        - name: pipeline
          image: data-pipeline:latest
          ports:
            - containerPort: 8000
          env:
            - name: WAREHOUSE_PATH
              value: /data/warehouse
            - name: MINIO_ENDPOINT
              value: http://minio:9000
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: data-pipeline
  namespace: data-platform
spec:
  selector:
    app: data-pipeline
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
